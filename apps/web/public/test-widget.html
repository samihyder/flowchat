<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowChat Widget Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 80px auto; padding: 0 24px; color: #111827; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6b7280; line-height: 1.6; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>Widget test page</h1>
  <p>
    Chat bubble should appear in the bottom-right. Send a message, then check
    <strong>Dashboard</strong> in FlowChat as an agent.
  </p>
  <p>
    Production embed uses <code>flowchat-web-ten.vercel.app</code>. Locally, API calls use this origin.
    Copy the latest snippet from <strong>Settings → Inboxes → Embed code</strong>.
  </p>

  <!-- FlowChat Widget — paste before </body> -->
  <script>
    window.flowchat = {
      inboxId: "b9d1bc74-652f-4bf1-b339-904af115d033",
      apiUrl: window.location.hostname === "localhost"
        ? window.location.origin + "/api"
        : "https://flowchat-web-ten.vercel.app/api",
      configUrl: window.location.hostname === "localhost"
        ? window.location.origin + "/api"
        : "https://flowchat-web-ten.vercel.app/api",
      wsUrl: "wss://flowchat-ws-production.up.railway.app"
    };
  </script>
  <script src="/widget.js?v=8" async></script>
</body>
</html>
