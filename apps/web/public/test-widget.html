<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowChat Widget Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 80px auto; padding: 0 24px; color: #111827; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6b7280; line-height: 1.6; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>Widget test page</h1>
  <p>
    Replace <code>YOUR_INBOX_ID</code> below with an inbox ID from Settings → Inboxes,
    then open this page while the API and WS services are running.
  </p>

  <script>
    window.flowchat = {
      inboxId: 'YOUR_INBOX_ID',
      apiUrl: 'http://localhost:3001',
      wsUrl: 'ws://localhost:3002'
    };
  </script>
  <script src="/widget.js" async></script>
</body>
</html>
