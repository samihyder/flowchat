  <title>FlowChat Widget Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 80px auto; padding: 0 24px; color: #111827; }

  <h1>Widget test page</h1>
  <p>

  <p>
    To use a different inbox, copy the embed code from <strong>Settings → Inboxes</strong>

  </p>

  <script>
    window.flowchat = {
      inboxId: '74ddbd4f-1205-4715-8296-75c96dd6b64c',
      apiUrl: 'https://flowchat-production-be88.up.railway.app',
      configUrl: window.location.origin + '/api',

    };
  </script>
  <script src="/widget.js" async></script>
