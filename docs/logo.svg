<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none" role="img" aria-label="FlowChat logo">
  <defs>
    <!-- Primary indigo gradient -->
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Teal accent gradient -->
    <linearGradient id="dotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Icon mark ── -->
  <!-- Outer rounded square -->
  <rect x="0" y="4" width="56" height="56" rx="16" fill="url(#iconGrad)"/>

  <!-- Main chat bubble -->
  <path d="M10 15 Q10 11 14 11 H42 Q46 11 46 15 V34 Q46 38 42 38 H22 L14 46 V38 H14 Q10 38 10 34 Z"
        fill="white" opacity="0.95"/>

  <!-- Three message dots (inline, centre of bubble) -->
  <circle cx="21" cy="24.5" r="3" fill="url(#iconGrad)"/>
  <circle cx="28" cy="24.5" r="3" fill="url(#iconGrad)"/>
  <circle cx="35" cy="24.5" r="3" fill="url(#iconGrad)"/>

  <!-- Flow indicator — small teal dot bottom-right of icon square -->
  <circle cx="47" cy="47" r="6" fill="url(#dotGrad)" filter="url(#glow)"/>
  <path d="M44.5 47 L46.2 48.7 L49.5 45.5" stroke="white" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Wordmark ── -->
  <text x="68" y="40"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="-0.5"
        fill="#111827">Flow</text>
  <text x="131" y="40"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="-0.5"
        fill="url(#iconGrad)">Chat</text>
</svg>
