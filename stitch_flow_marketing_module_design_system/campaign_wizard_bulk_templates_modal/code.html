<!DOCTYPE html>

<body class="bg-gray-50 text-on-surface font-body-md overflow-hidden">

    <!-- Top Navigation Anchor -->
    <header class="flex justify-between items-center h-16 px-8 ml-64 bg-surface sticky top-0 z-40 border-b border-gray-200">
        <div class="flex items-center gap-4">
            <span class="font-headline-sm text-headline-sm font-bold text-primary">Campaign Builder</span>
            <div class="flex gap-6 ml-8">
                <a href="#" class="text-on-surface-variant hover:text-primary transition-colors font-body-md">Drafts</a>
                <a href="#" class="text-primary border-b-2 border-primary pb-1 font-bold font-body-md">Scheduled</a>
                <a href="#" class="text-on-surface-variant hover:text-primary transition-colors font-body-md">Sent</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-gray-100 rounded-full">notifications</button>
            <button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-gray-100 rounded-full">settings</button>
            <div class="w-8 h-8 rounded-full overflow-hidden bg-primary-fixed flex items-center justify-center">
                <img src="placeholder" data-alt="A professional headshot of a female sales executive with a friendly smile, set against a clean minimalist studio background. The lighting is soft and corporate, matching the high-contrast light mode UI of the application. The image conveys authority, reliability, and modern enterprise professionalism." class="w-full h-full object-cover">
            </div>
        </div>
    </header>

    <!-- Side Navigation Anchor -->
    <aside class="h-screen w-64 fixed left-0 top-0 border-r border-gray-200 bg-surface p-4 flex flex-col z-50">
        <div class="mb-8 px-2">
            <h1 class="font-headline-sm text-headline-sm font-bold text-primary">SalesHub</h1>
            <p class="text-xs text-gray-500 font-label-caps uppercase tracking-wider">Campaign Manager</p>
        </div>
        
        <nav class="flex-1 space-y-1">
            <div class="flex items-center gap-3 px-4 py-2 text-primary bg-primary-surface rounded-lg font-bold">
                <span class="material-symbols-outlined">mail</span>
                <span>Campaigns</span>
            </div>
            <div class="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:bg-gray-50 transition-colors cursor-pointer">
                <span class="material-symbols-outlined">description</span>
                <span>Templates</span>
            </div>
        </nav>

        <button class="mt-auto w-full bg-primary text-white py-2.5 rounded-lg font-body-lg shadow-sm hover:bg-primary-hover transition-colors flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-[20px]">add</span>
            <span>New Campaign</span>
        </button>
    </aside>

    <!-- Main Content Canvas (Background Context) -->
    <main class="ml-64 p-8 filter blur-[4px]">
        <div class="max-w-container-max-wizard mx-auto">
            <div class="mb-8 flex items-center justify-between">
                <div>
                    <h2 class="font-headline-md text-headline-md text-on-surface">Step 2: Email Sequence</h2>
                    <p class="text-gray-500 font-body-md">Build the touchpoints for your automation flow.</p>
                </div>
                <div class="flex gap-2">
                    <span class="px-3 py-1 bg-status-success-bg text-status-success-text rounded-full text-xs font-bold font-label-caps">DRAFT SAVED</span>
                </div>
            </div>

            <!-- Sequence Timeline Mockup -->
            <div class="relative space-y-12">
                <!-- Step Card 1 -->
                <div class="relative z-10 bg-white border-2 border-primary-border rounded-xl p-6 shadow-sm max-w-2xl mx-auto ring-4 ring-primary-surface">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">1</div>
                            <h3 class="font-body-lg text-body-lg">Initial Connection</h3>
                        </div>
                        <span class="text-xs text-gray-400 font-data-mono">Day 0</span>
                    </div>
                    <div class="h-24 bg-gray-50 rounded-lg border border-dashed border-gray-200 flex items-center justify-center">
                        <span class="text-gray-400 italic">Welcome Message Content...</span>
                    </div>
                </div>

                <!-- Connector Line -->
                <div class="absolute left-1/2 top-0 bottom-0 w-0.5 bg-gray-200 -z-0 transform -translate-x-1/2"></div>

                <!-- Add Step Placeholder -->
                <div class="relative z-10 flex justify-center">
                    <button class="w-12 h-12 rounded-full bg-white border-2 border-dashed border-primary text-primary flex items-center justify-center hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div class="fixed inset-0 z-[60] flex items-center justify-center p-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-on-background/30 blur-overlay"></div>
        
        <!-- Modal Content -->
        <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10">
                <h3 class="font-headline-sm text-headline-sm text-on-surface">Add multiple emails from templates</h3>
                <button class="material-symbols-outlined text-gray-400 hover:text-on-surface transition-colors">close</button>
            </div>

            <!-- Body -->
            <div class="px-6 py-5 space-y-6 overflow-y-auto max-h-[716px] custom-scrollbar">
                
                <!-- Search -->
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
                    <input type="text" placeholder="Search templates..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-border focus:border-primary-border outline-none transition-all font-body-md">
                </div>

                <!-- Scrollable Checklist -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest font-label-caps">Available Templates</label>
                    <div class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                        <!-- Checklist Items -->
                        <div class="flex items-center p-3 rounded-lg border border-gray-100 bg-gray-50/50 hover:bg-white hover:border-primary-border transition-all cursor-pointer group">
                            <input type="checkbox" checked class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary cursor-pointer">
                            <div class="ml-4 flex-1">
                                <p class="font-body-md text-on-surface font-semibold">Welcome</p>
                                <p class="text-xs text-gray-400">Standard intro sequence</p>
                            </div>
                            <span class="material-symbols-outlined text-gray-300 group-hover:text-primary transition-colors">description</span>
                        </div>
                        <div class="flex items-center p-3 rounded-lg border border-gray-100 bg-gray-50/50 hover:bg-white hover:border-primary-border transition-all cursor-pointer group">
                            <input type="checkbox" checked class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary cursor-pointer">
                            <div class="ml-4 flex-1">
                                <p class="font-body-md text-on-surface font-semibold">Follow-up</p>
                                <p class="text-xs text-gray-400">Gentle nudge for non-replies</p>
                            </div>
                            <span class="material-symbols-outlined text-gray-300 group-hover:text-primary transition-colors">history</span>
                        </div>
                        <div class="flex items-center p-3 rounded-lg border border-gray-100 bg-gray-50/50 hover:bg-white hover:border-primary-border transition-all cursor-pointer group">
                            <input type="checkbox" checked class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary cursor-pointer">
                            <div class="ml-4 flex-1">
                                <p class="font-body-md text-on-surface font-semibold">Re-engagement</p>
                                <p class="text-xs text-gray-400">Win back stale leads</p>
                            </div>
                            <span class="material-symbols-outlined text-gray-300 group-hover:text-primary transition-colors">refresh</span>
                        </div>
                        <div class="flex items-center p-3 rounded-lg border border-gray-100 bg-gray-50/50 hover:bg-white hover:border-primary-border transition-all cursor-pointer group">
                            <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary cursor-pointer">
                            <div class="ml-4 flex-1">
                                <p class="font-body-md text-on-surface font-semibold">Demo reminder</p>
                                <p class="text-xs text-gray-400">24h before meeting</p>
                            </div>
                            <span class="material-symbols-outlined text-gray-300 group-hover:text-primary transition-colors">event</span>
                        </div>
                        <div class="flex items-center p-3 rounded-lg border border-gray-100 bg-gray-50/50 hover:bg-white hover:border-primary-border transition-all cursor-pointer group">
                            <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary cursor-pointer">
                            <div class="ml-4 flex-1">
                                <p class="font-body-md text-on-surface font-semibold">Case study</p>
                                <p class="text-xs text-gray-400">Proof and success stories</p>
                            </div>
                            <span class="material-symbols-outlined text-gray-300 group-hover:text-primary transition-colors">fact_check</span>
                        </div>
                        <div class="flex items-center p-3 rounded-lg border border-gray-100 bg-gray-50/50 hover:bg-white hover:border-primary-border transition-all cursor-pointer group">
                            <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary cursor-pointer">
                            <div class="ml-4 flex-1">
                                <p class="font-body-md text-on-surface font-semibold">Holiday check-in</p>
                                <p class="text-xs text-gray-400">Seasonal relationship building</p>
                            </div>
                            <span class="material-symbols-outlined text-gray-300 group-hover:text-primary transition-colors">celebration</span>
                        </div>
                    </div>
                </div>

                <!-- Timing & Spacing -->
                <div class="bg-primary-surface border border-primary-border rounded-xl p-5 space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="font-body-lg text-primary flex items-center gap-2">
                            <span class="material-symbols-outlined text-[20px]">schedule</span>
                            Sequence Spacing
                        </label>
                        <div class="flex items-center gap-2">
                            <div class="relative w-16">
                                <input type="number" value="3" class="w-full py-1.5 px-3 border border-primary-border rounded-lg text-center font-data-mono focus:ring-primary focus:border-primary outline-none">
                            </div>
                            <span class="text-primary font-body-md">days at</span>
                            <div class="relative w-24">
                                <input type="time" value="09:00" class="w-full py-1.5 px-3 border border-primary-border rounded-lg text-center font-data-mono focus:ring-primary focus:border-primary outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-4 border-t border-primary-border/30">
                        <label class="font-body-lg text-primary flex items-center gap-2">
                            <span class="material-symbols-outlined text-[20px]">today</span>
                            First step send
                        </label>
                        <div class="flex items-center gap-2">
                            <div class="relative">
                                <input type="date" value="2024-10-28" class="py-1.5 px-3 border border-primary-border rounded-lg font-data-mono focus:ring-primary focus:border-primary outline-none">
                            </div>
                            <div class="relative w-24">
                                <input type="time" value="09:00" class="w-full py-1.5 px-3 border border-primary-border rounded-lg text-center font-data-mono focus:ring-primary focus:border-primary outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Helper Text -->
                <div class="flex items-start gap-3 p-4 bg-gray-50 border-l-4 border-primary rounded-r-lg">
                    <span class="material-symbols-outlined text-primary">info</span>
                    <p class="text-on-surface-variant font-body-md leading-relaxed">
                        Creates <span class="font-bold text-on-surface">3 new steps</span> in your campaign sequence with a total duration of 9 days. Templates will be automatically populated with merge tags.
                    </p>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end items-center gap-3 bg-white sticky bottom-0">
                <button class="px-5 py-2 text-on-surface-variant hover:bg-gray-100 rounded-lg font-body-lg transition-colors">
                    Cancel
                </button>
                <button class="px-6 py-2.5 bg-primary text-white rounded-lg font-body-lg shadow-sm hover:bg-primary-hover transition-all active:scale-[0.98]">
                    Add 3 steps
                </button>
            </div>
        </div>
    </div>

    <!-- Background Decoration / Glass Pattern -->
    <div class="fixed inset-0 pointer-events-none -z-10 opacity-30">
        <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-fixed blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-[500px] h-[500px] bg-secondary-fixed blur-[150px] rounded-full"></div>
    </div>

</body>
</html></style></head><body></body></html>
